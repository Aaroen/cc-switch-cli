name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "构建原因（dispatch 不创建公开 Release，仅产出可下载产物供验收；确认后再推 v* tag 发布）"
        required: false
        default: "verification build"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    env:
      HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
      HAS_APPLE_SIGNING_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.KEYCHAIN_PASSWORD != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_name: windows-x86_64
            cli_archive: cc-switch-cli-windows-x86_64.zip
          - os: ubuntu-22.04
            artifact_name: linux-x86_64
            arch: x86_64
            cli_archive: cc-switch-cli-linux-x86_64.tar.gz
          # macOS / arm64 暂不构建（仅产出 Linux + Windows）；保留以便日后恢复
          # - os: ubuntu-22.04-arm
          #   artifact_name: linux-arm64
          #   arch: arm64
          #   cli_archive: cc-switch-cli-linux-arm64.tar.gz
          # - os: macos-14
          #   artifact_name: macos-universal
          #   cli_archive: cc-switch-cli-macos-universal.tar.gz
    continue-on-error: ${{ matrix.os != 'ubuntu-22.04' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            elfutils \
            xdg-utils \
            clang \
            zip \
            unzip \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri signing key
        if: env.HAS_TAURI_SIGNING_KEY == 'true'
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          KEY_PATH="$RUNNER_TEMP/tauri_signing.key"

          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$RAW" > "$KEY_PATH"
          else
            if DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
              && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
              printf '%s\n' "$DECODED" > "$KEY_PATH"
            elif echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
              ONE=$(printf '%s' "$RAW" | tr -d '\r\n')
              printf '%s\n%s\n' "untrusted comment: tauri signing key" "$ONE" > "$KEY_PATH"
            else
              echo "TAURI_SIGNING_PRIVATE_KEY format is invalid" >&2
              exit 1
            fi
          fi

          if command -v base64 >/dev/null 2>&1; then
            KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
          elif command -v openssl >/dev/null 2>&1; then
            KEY_B64=$(openssl base64 -A -in "$KEY_PATH")
          else
            KEY_B64=$(KEY_PATH="$KEY_PATH" node -e "process.stdout.write(require('fs').readFileSync(process.env.KEY_PATH).toString('base64'))")
          fi

          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING_CERT == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Decode .p12 certificate from base64
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "${{ secrets.APPLE_CERTIFICATE }}" | (base64 --decode 2>/dev/null || base64 -D) > "$CERT_PATH"

          # Save original default keychain for cleanup
          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain -d user | tr -d '"' | xargs)
          echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Dynamically resolve signing identity (must be "Developer ID Application")
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No 'Developer ID Application' identity found — listing all identities:" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "✅ Signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          # Cleanup certificate file
          rm -f "$CERT_PATH"

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # Decode .p12 certificate from base64
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "${{ secrets.APPLE_CERTIFICATE }}" | (base64 --decode 2>/dev/null || base64 -D) > "$CERT_PATH"

          # Save original default keychain for cleanup
          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain -d user | tr -d '"' | xargs)
          echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Dynamically resolve signing identity (must be "Developer ID Application")
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No 'Developer ID Application' identity found — listing all identities:" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "✅ Signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          # Cleanup certificate file
          rm -f "$CERT_PATH"

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          build_args=(--ci --target universal-apple-darwin)
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            build_args+=(--config '{"bundle":{"createUpdaterArtifacts":false}}')
          fi

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== macOS build/notarization attempt ${attempt}/${max_attempts} ==="
            if pnpm tauri build "${build_args[@]}"; then
              echo "✅ macOS build/notarization succeeded"
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ macOS build/notarization failed after ${max_attempts} attempts" >&2
              exit 1
            fi
            sleep_seconds=$((attempt * 60))
            echo "⚠️ macOS build/notarization failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          build_args=(--ci)
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            build_args+=(--config '{"bundle":{"createUpdaterArtifacts":false}}')
          fi
          pnpm tauri build "${build_args[@]}"

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          build_args=(--ci --bundles appimage,deb,rpm)
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            build_args+=(--config '{"bundle":{"createUpdaterArtifacts":false}}')
          fi
          pnpm tauri build "${build_args[@]}"

      - name: Build CLI binary (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --bin cc-switch-cli

      - name: Build CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --bin cc-switch-cli

      - name: Build CLI binary (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --release --manifest-path src-tauri/Cargo.toml --bin cc-switch-cli --target aarch64-apple-darwin
          cargo build --release --manifest-path src-tauri/Cargo.toml --bin cc-switch-cli --target x86_64-apple-darwin
          mkdir -p release-cli
          lipo -create \
            src-tauri/target/aarch64-apple-darwin/release/cc-switch-cli \
            src-tauri/target/x86_64-apple-darwin/release/cc-switch-cli \
            -output release-cli/cc-switch-cli
          chmod +x release-cli/cc-switch-cli

      - name: Prepare macOS assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"
          TAR_GZ=""
          APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$TAR_GZ" ]   && TAR_GZ=$(find "$path" -maxdepth 1 -name "*.tar.gz" -type f | head -1 || true)
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -n "$TAR_GZ" ]; then
            NEW_TAR_GZ="CC-Switch-${VERSION}-macOS.tar.gz"
            cp "$TAR_GZ" "release-assets/$NEW_TAR_GZ"
            [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/$NEW_TAR_GZ.sig" || true
          else
            echo "No macOS updater artifact found; continue with zip bundle only"
          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found" >&2
            exit 1
          fi

          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            xcrun stapler staple "$APP_PATH"
            echo "✅ .app stapled"

            HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
            NEW_DMG="CC-Switch-${VERSION}-macOS.dmg"
            DMG_STAGE_DIR="$RUNNER_TEMP/dmg-stage"
            rm -rf "$DMG_STAGE_DIR"
            mkdir -p "$DMG_STAGE_DIR"
            ditto "$APP_PATH" "$DMG_STAGE_DIR/CC Switch.app"

            create-dmg \
              --volname "CC Switch" \
              --background "src-tauri/icons/dmg-background.png" \
              --window-size 660 400 \
              --window-pos 200 120 \
              --icon-size 80 \
              --icon "CC Switch.app" 180 220 \
              --hide-extension "CC Switch.app" \
              --app-drop-link 480 220 \
              --codesign "$APPLE_SIGNING_IDENTITY" \
              --no-internet-enable \
              "release-assets/$NEW_DMG" \
              "$DMG_STAGE_DIR"

            rm -rf "$DMG_STAGE_DIR"
            echo "✅ Styled DMG created: $NEW_DMG"
          else
            echo "APPLE_SIGNING_IDENTITY unavailable; skip DMG creation"
          fi

          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          NEW_ZIP="CC-Switch-${VERSION}-macOS.zip"
          (
            cd "$APP_DIR"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "$NEW_ZIP"
          )
          mv "$APP_DIR/$NEW_ZIP" "release-assets/$NEW_ZIP"

          tmp_dir="$(mktemp -d)"
          cp release-cli/cc-switch-cli "$tmp_dir/cc-switch-cli"
          ln -sfn cc-switch-cli "$tmp_dir/cc-switch"
          ln -sfn cc-switch-cli "$tmp_dir/ccs"
          ln -sfn cc-switch-cli "$tmp_dir/csc"
          tar -C "$tmp_dir" -czf "release-assets/${{ matrix.cli_archive }}" cc-switch-cli cc-switch ccs csc

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING_CERT == 'true'
        shell: bash
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Apple notarization credentials unavailable; skip DMG notarization"
            exit 0
          fi

          DMG_PATH=$(find release-assets -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg found in release-assets/; skip DMG notarization"
            exit 0
          fi

          echo "=== Notarizing DMG: $DMG_PATH ==="
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== DMG notarization attempt ${attempt}/${max_attempts} ==="
            if xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait; then
              echo "✅ DMG notarization succeeded"
              xcrun stapler staple "$DMG_PATH"
              echo "✅ DMG stapled"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ DMG notarization failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "⚠️ DMG notarization failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Verify macOS code signing and notarization
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING_CERT == 'true'
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found for verification" >&2
            exit 1
          fi
          echo "=== Verifying .app: $APP_PATH ==="
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -t exec -vv "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          DMG_PATH=$(find release-assets -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
          if [ -n "$DMG_PATH" ]; then
            echo "=== Verifying .dmg: $DMG_PATH ==="
            codesign --verify --verbose=2 "$DMG_PATH"
            spctl -a -t open --context context:primary-signature -vv "$DMG_PATH"
            xcrun stapler validate "$DMG_PATH"
          fi

      - name: Prepare Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $version = $env:GITHUB_REF_NAME -replace '/', '-'  # 替换 / 为 - (workflow_dispatch 或分支名含斜杠)

          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "CC-Switch-$version-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets ("$dest.sig"))
            }
          }

          $guiExeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $guiExe = $guiExeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $guiExe) {
            $portableDir = 'release-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $guiExe (Join-Path $portableDir 'cc-switch.exe')
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            @(
              '# CC Switch portable build marker',
              'portable=true'
            ) | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/CC-Switch-$version-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
          }

          $cliExeCandidates = @(
            'src-tauri/target/release/cc-switch-cli.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch-cli.exe'
          )
          $cliExe = $cliExeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -eq $cliExe) {
            throw 'cc-switch-cli.exe not found'
          }

          $cliDir = 'release-assets/cc-switch-cli-windows-x86_64'
          New-Item -ItemType Directory -Force -Path $cliDir | Out-Null
          Copy-Item $cliExe (Join-Path $cliDir 'cc-switch-cli.exe')
          Copy-Item $cliExe (Join-Path $cliDir 'cc-switch.exe')
          Copy-Item $cliExe (Join-Path $cliDir 'ccs.exe')
          Copy-Item $cliExe (Join-Path $cliDir 'csc.exe')
          Compress-Archive -Path "$cliDir/*" -DestinationPath ("release-assets/${{ matrix.cli_archive }}") -Force
          Remove-Item -Recurse -Force $cliDir

      - name: Prepare Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME//\//-}"  # 替换 / 为 - (workflow_dispatch 或分支名含斜杠)
          ARCH="${{ matrix.arch }}"
          BUNDLE_ROOT="src-tauri/target/release/bundle"

          APPIMAGE=$(find "$BUNDLE_ROOT" -name "*.AppImage" -type f | head -1 || true)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found under $BUNDLE_ROOT" >&2
            exit 1
          fi
          NEW_APPIMAGE="CC-Switch-${VERSION}-Linux-${ARCH}.AppImage"
          cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
          [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig" || true

          DEB=$(find "$BUNDLE_ROOT" -name "*.deb" -type f | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.deb"
          fi

          RPM=$(find "$BUNDLE_ROOT" -name "*.rpm" -type f | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.rpm"
          fi

          CLI_BIN="src-tauri/target/release/cc-switch-cli"
          if [ ! -f "$CLI_BIN" ]; then
            echo "Linux CLI binary is missing" >&2
            exit 1
          fi

          chmod +x install-ccs.sh "$CLI_BIN"
          tmp_dir="$(mktemp -d)"
          cp install-ccs.sh "$tmp_dir/install-ccs.sh"
          cp "$CLI_BIN" "$tmp_dir/cc-switch"
          cp "$CLI_BIN" "$tmp_dir/cc-switch-cli"
          ln -sfn cc-switch-cli "$tmp_dir/ccs"
          ln -sfn cc-switch-cli "$tmp_dir/csc"
          tar -C "$tmp_dir" -czf "release-assets/${{ matrix.cli_archive }}" install-ccs.sh cc-switch cc-switch-cli ccs csc

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Upload prepared assets
        if: hashFiles('release-assets/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build-release
    # 仅在推送 v* tag 时发布；workflow_dispatch 验收构建只产出可下载产物，不创建公开 Release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }}
          prerelease: false
          body: |
            ## CC Switch ${{ github.ref_name }}

            面向 GUI 与 CLI/无头场景的多平台发布包。

            ### GUI 安装包

            - macOS: `CC-Switch-${{ github.ref_name }}-macOS.zip`；如已配置 Apple 签名/公证，则同时提供 `CC-Switch-${{ github.ref_name }}-macOS.dmg` 与 `CC-Switch-${{ github.ref_name }}-macOS.tar.gz`
            - Windows: `CC-Switch-${{ github.ref_name }}-Windows.msi` 与 `CC-Switch-${{ github.ref_name }}-Windows-Portable.zip`
            - Linux x86_64: `CC-Switch-${{ github.ref_name }}-Linux-x86_64.AppImage` / `.deb` / `.rpm`
            - Linux arm64: `CC-Switch-${{ github.ref_name }}-Linux-arm64.AppImage` / `.deb` / `.rpm`

            ### CLI 终端包

            - Linux x86_64: `cc-switch-cli-linux-x86_64.tar.gz`
            - Linux arm64: `cc-switch-cli-linux-arm64.tar.gz`
            - macOS universal: `cc-switch-cli-macos-universal.tar.gz`
            - Windows x86_64: `cc-switch-cli-windows-x86_64.zip`

            提示：macOS 如遇“已损坏”提示，可在终端执行 `xattr -cr "/Applications/CC Switch.app"`。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish-release
    permissions:
      contents: write
    steps:
      - name: Prepare GH
        run: |
          gh --version || (type -p curl >/dev/null && sudo apt-get update && sudo apt-get install -y gh || true)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl || true

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"
          mac_url=""
          mac_sig=""
          win_url=""
          win_sig=""
          linux_x64_url=""
          linux_x64_sig=""
          linux_arm64_url=""
          linux_arm64_sig=""
          shopt -s nullglob
          for sig in dl/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *.tar.gz)
                mac_url="$url"
                mac_sig="$sig_content"
                ;;
              *-Linux-arm64.AppImage|*-Linux-arm64.appimage)
                linux_arm64_url="$url"
                linux_arm64_sig="$sig_content"
                ;;
              *-Linux-x86_64.AppImage|*-Linux-x86_64.appimage)
                linux_x64_url="$url"
                linux_x64_sig="$sig_content"
                ;;
              *.msi|*.exe)
                win_url="$url"
                win_sig="$sig_content"
                ;;
            esac
          done

          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"Release $TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_url" ] && [ -n "$mac_sig" ]; then
              for key in darwin-aarch64 darwin-x86_64; do
                [ "$first" -eq 0 ] && echo ','
                echo "    \"$key\": {\"signature\": \"$mac_sig\", \"url\": \"$mac_url\"}"
                first=0
              done
            fi
            if [ -n "$win_url" ] && [ -n "$win_sig" ]; then
              [ "$first" -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            if [ -n "$linux_x64_url" ] && [ -n "$linux_x64_sig" ]; then
              [ "$first" -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_x64_sig\", \"url\": \"$linux_x64_url\"}"
              first=0
            fi
            if [ -n "$linux_arm64_url" ] && [ -n "$linux_arm64_sig" ]; then
              [ "$first" -eq 0 ] && echo ','
              echo "    \"linux-aarch64\": {\"signature\": \"$linux_arm64_sig\", \"url\": \"$linux_arm64_url\"}"
              first=0
            fi
            echo '  }'
            echo '}'
          } > "$tmp_json"
          cat "$tmp_json"
          mv "$tmp_json" latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"
